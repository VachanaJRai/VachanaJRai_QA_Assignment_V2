name: QA Automation Regression

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  automation-tests:
    name: Run UI and API tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run regression suite in headless Chrome
        run: mvn -B clean test -Pregression,headless -Dbrowser=chrome -Dheadless=true -Dparallel.threads=2

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports
          retention-days: 14

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: target/reports/extent
          retention-days: 14

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-and-logs
          path: |
            target/screenshots
            target/logs
          retention-days: 14
